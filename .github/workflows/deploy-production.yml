name: Deploy Production

on:
  workflow_run:
    workflows: [CI]
    types: [completed]

permissions:
  contents: read

concurrency:
  group: production-deploy
  cancel-in-progress: false

env:
  VERCEL_ORG_ID: team_jtma3G3X3cC34Ox6kAiZA7Dk
  VERCEL_PROJECT_ID: prj_FkwU97q9h094J5bBhaxmdLW4QChb
  VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}

jobs:
  deploy:
    if: >-
      ${{
        github.event.workflow_run.conclusion == 'success' &&
        github.event.workflow_run.event == 'push' &&
        github.event.workflow_run.head_branch == 'master'
      }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment:
      name: production
      url: https://projectops360.com
    steps:
      - name: Guard - require deployment credentials
        run: |
          set -euo pipefail
          if [ -z "$VERCEL_TOKEN" ]; then
            echo "::error::VERCEL_TOKEN is required for production deployment."
            exit 1
          fi

      - name: Checkout exact CI-approved commit
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install pinned Vercel CLI
        run: npm install -g vercel@54.21.1

      - name: Deploy exact CI-approved commit
        id: deploy
        run: |
          set -euo pipefail
          output="$(vercel deploy --prod --yes --token="$VERCEL_TOKEN")"
          deployment_url="$(printf '%s\n' "$output" | tail -n 1)"
          if [[ "$deployment_url" != https://* ]]; then
            echo "::error::Vercel did not return a deployment URL."
            exit 1
          fi
          echo "url=$deployment_url" >> "$GITHUB_OUTPUT"

      - name: Smoke production domain
        run: |
          set -euo pipefail
          for attempt in {1..12}; do
            status="$(curl --location --silent --show-error --output /dev/null --write-out '%{http_code}' --max-time 20 https://projectops360.com/landing || true)"
            if [[ "$status" == "200" ]]; then
              echo "Production smoke passed."
              exit 0
            fi
            echo "Attempt $attempt returned HTTP $status; retrying..."
            sleep 10
          done
          echo "::error::Production smoke failed. Previous Vercel deployment remains available for rollback."
          exit 1

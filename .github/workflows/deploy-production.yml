name: Deploy Production

# Auto-promote master to the production domain (projectops360.vercel.app).
#
# WHY THIS EXISTS: pushing to master creates a Vercel "production" build, but that
# build does NOT move the projectops360.vercel.app alias on its own — the alias was
# only ever updated by `vercel --prod` from the CLI. This workflow runs that promote
# step automatically after every merge, so the live domain always matches master.
#
# ONE-TIME SETUP: add a repo secret VERCEL_TOKEN
#   (GitHub → Settings → Secrets and variables → Actions → New repository secret).
#   Create the token at https://vercel.com/account/tokens (scope: the project's team).
# The org/project IDs below are NOT secret (they live in .vercel/project.json).
#
# Until the secret exists the job runs but SKIPS gracefully (stays green), so this
# never blocks a merge.

on:
  push:
    branches: [master]

# Never run two production promotions at once; let the newest finish (don't cancel
# a promote mid-flight).
concurrency:
  group: production-deploy
  cancel-in-progress: false

env:
  VERCEL_ORG_ID: team_jtma3G3X3cC34Ox6kAiZA7Dk
  VERCEL_PROJECT_ID: prj_FkwU97q9h094J5bBhaxmdLW4QChb
  VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Guard — require VERCEL_TOKEN
        id: guard
        run: |
          if [ -z "$VERCEL_TOKEN" ]; then
            echo "::warning::VERCEL_TOKEN secret is not set — skipping production deploy. Add it in repo Settings → Secrets → Actions."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout
        if: steps.guard.outputs.skip != 'true'
        uses: actions/checkout@v4

      - name: Setup Node
        if: steps.guard.outputs.skip != 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install Vercel CLI
        if: steps.guard.outputs.skip != 'true'
        run: npm install -g vercel@latest

      - name: Pull Vercel project settings (production)
        if: steps.guard.outputs.skip != 'true'
        run: vercel pull --yes --environment=production --token="$VERCEL_TOKEN"

      - name: Build (production)
        if: steps.guard.outputs.skip != 'true'
        run: vercel build --prod --token="$VERCEL_TOKEN"

      - name: Deploy prebuilt to production (auto-aliases projectops360.vercel.app)
        if: steps.guard.outputs.skip != 'true'
        run: vercel deploy --prebuilt --prod --token="$VERCEL_TOKEN"

<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ProjectOps360° — Offline</title>
    <style>
      :root { color-scheme: light dark; }
      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
        background: #f8fafc;
        color: #0f172a;
      }
      main { max-width: 24rem; padding: 2rem; text-align: center; }
      img { width: 64px; height: 64px; border-radius: 14px; }
      h1 { margin: 1.25rem 0 0.5rem; font-size: 1.125rem; }
      p { margin: 0 0 1.5rem; font-size: 0.875rem; line-height: 1.5; color: #475569; }
      button {
        border: 0;
        border-radius: 0.5rem;
        background: #022826;
        color: #fff;
        padding: 0.625rem 1.25rem;
        font-size: 0.875rem;
        font-weight: 600;
        cursor: pointer;
      }
      @media (prefers-color-scheme: dark) {
        body { background: #0f172a; color: #f8fafc; }
        p { color: #94a3b8; }
      }
    </style>
  </head>
  <body>
    <main>
      <img src="/icons/icon-192.png" alt="ProjectOps360°" />
      <h1>Sin conexión · You are offline</h1>
      <p>
        ProjectOps360° necesita conexión para mostrar datos actualizados.
        Vuelve a intentarlo cuando recuperes la red.
        <br /><br />
        ProjectOps360° needs a connection to show live data. Try again once you
        are back online.
      </p>
      <button type="button" onclick="location.reload()">
        Reintentar · Retry
      </button>
    </main>
  </body>
</html>
